            color: var(--bg); 
            padding: 20px 0; 
            width: 100%;
            max-width: 350px;
            font-size: 19px; 
            font-weight: 800; 
            text-decoration: none; 
            border-radius: 100px; 
            cursor: pointer;
            border: none;
            transition: 0.3s;
        }
        .main-btn:hover { background: var(--blue); transform: scale(1.02); }

        footer { padding: 40px 20px; border-top: 1px solid var(--border); color: #333; font-size: 11px; margin-top: 50px; }
